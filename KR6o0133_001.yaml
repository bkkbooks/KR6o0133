body:
  text: 西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯法身我今稽首法身佛無喻難思普遍智充滿法界無罣礙湛然寂靜無等等非有非無性真實亦非多少離數量平等無相若虛空福利自他亦如是報身我今稽首報身佛湛然安住大牟尼哀愍化度菩薩衆處會如日而普照三祇積集諸功德始能圓滿寂靜道以大音聲談妙法普令獲得平等果化身我今稽首化身佛菩提樹下成正覺或起變現或寂靜或復往化於十方或轉法輪於鹿苑或現大光如火聚三塗苦報悉能除三界無比大牟尼回向如是佛身無漏智我常信解淨三業以無量慧大福行一心垂愍諸群生以今頌讚三身佛所獲無漏功德種願我速證佛菩提盡引衆生歸正道
